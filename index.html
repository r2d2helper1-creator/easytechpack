<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#222;display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;flex-shrink:0;z-index:100}
.sidebar-header{padding:20px;border-bottom:1px solid #333}
.sidebar-header h1{font-size:18px;font-weight:700;letter-spacing:-.5px}
.sidebar-header p{font-size:11px;color:#888;margin-top:4px}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-item{padding:10px 20px;cursor:pointer;font-size:13px;color:#aaa;transition:all .15s;display:flex;align-items:center;gap:10px}
.nav-item:hover{background:#16213e;color:#fff}
.nav-item.active{background:#0f3460;color:#fff;border-left:3px solid #e94560}
.nav-icon{width:18px;text-align:center;font-size:13px}
.sidebar-footer{padding:15px 20px;border-top:1px solid #333}
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:#1a1a2e;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:18px;cursor:pointer}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.export-btn{width:100%;padding:10px;background:#e94560;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px}
.export-btn:hover{background:#c73b54}.export-btn:disabled{background:#666;cursor:not-allowed}
.new-btn{width:100%;padding:8px;background:transparent;color:#888;border:1px solid #444;border-radius:6px;font-size:12px;cursor:pointer}
.new-btn:hover{color:#fff;border-color:#888}
.save-indicator{position:fixed;top:12px;right:20px;font-size:11px;color:#4caf50;opacity:0;transition:opacity .3s;z-index:50}
.save-indicator.show{opacity:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #ddd;padding:12px 30px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:10px}
.topbar-fields{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.topbar-fields label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
.topbar-fields input{border:1px solid #ddd;border-radius:4px;padding:6px 10px;font-size:13px;width:150px}
.topbar-fields input:focus{outline:none;border-color:#0f3460}
.file-name{font-size:10px;color:#999;font-family:monospace;margin-left:5px}
.page-content{flex:1;overflow-y:auto;padding:30px}
.page{display:none}.page.active{display:block}
.page-title{font-size:22px;font-weight:700;margin-bottom:6px}
.page-subtitle{font-size:13px;color:#888;margin-bottom:24px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px}
th{background:#f8f9fa;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;padding:12px 14px;text-align:left;border-bottom:2px solid #e9ecef}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:last-child td{border-bottom:none}
td input,td select,td textarea{border:none;background:transparent;width:100%;font-size:13px;padding:4px 0;font-family:inherit}
td input:focus,td select:focus,td textarea:focus{outline:none;background:#fffbe6}
td textarea{resize:vertical;min-height:30px}
.add-row{padding:8px 16px;background:#f0f0f0;border:1px dashed #ccc;border-radius:6px;color:#888;font-size:13px;cursor:pointer;width:100%;margin-top:5px}
.add-row:hover{background:#e8e8e8;color:#555;border-color:#999}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 5px}
.del-btn:hover{color:#e94560}
.logo-upload{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.logo-preview{width:120px;height:120px;border:2px dashed #ddd;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fafafa;cursor:pointer}
.logo-preview img{max-width:100%;max-height:100%;object-fit:contain}
.logo-preview span{font-size:12px;color:#aaa}
.cover-box{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:40px;max-width:600px}
.cover-row{margin-bottom:16px}
.cover-row label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cover-row input,.cover-row textarea{width:100%;border:1px solid #ddd;border-radius:4px;padding:8px 12px;font-size:14px}
.cover-row textarea{height:80px;resize:vertical;font-family:inherit}
.cover-row input:focus,.cover-row textarea:focus{outline:none;border-color:#0f3460}
.sketch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:20px}
.sketch-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.sketch-card-img{height:200px;background:#fafafa;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #eee;overflow:hidden;cursor:pointer}
.sketch-card-img img{max-width:100%;max-height:100%;object-fit:contain}
.sketch-card-input{padding:12px}
.sketch-card-input label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase}
.sketch-card-input input{width:100%;border:1px solid #ddd;border-radius:4px;padding:6px 10px;font-size:13px;margin-top:4px}
.sketch-card-input input:focus{outline:none;border-color:#0f3460}
.export-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.export-overlay.show{display:flex}
.export-box{background:#fff;border-radius:12px;padding:40px;text-align:center;max-width:400px}
.export-box h2{margin-bottom:10px}.export-box p{color:#666;margin-bottom:20px}
.export-box .spinner{width:40px;height:40px;border:3px solid #eee;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
.confidential{font-size:10px;color:#aaa;text-align:center;padding:15px;margin-top:20px;border-top:1px solid #eee;font-style:italic}
.page-num{font-size:10px;color:#ccc;text-align:right;padding:5px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-header h2{font-size:16px;font-weight:600}
.comments-section{margin-bottom:30px}
.comments-section h3{font-size:15px;font-weight:600;margin-bottom:12px;color:#444}
.status-approved{color:#4caf50;font-weight:600}
.status-rejected{color:#e94560;font-weight:600}
.status-pending{color:#ff9800;font-weight:600}
@media(max-width:768px){
.sidebar{position:fixed;left:-240px;top:0;height:100vh;transition:left .25s ease}
.sidebar.open{left:0}
.menu-toggle{display:block}
.sidebar-overlay.show{display:block}
.topbar{padding:12px 16px 12px 50px}
.topbar-fields{gap:10px}
.topbar-fields input{width:110px}
.page-content{padding:16px}
.sketch-grid{grid-template-columns:1fr}
.cover-box{padding:20px}

</style>
</head>

<script>

function escapeHTML(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
const SK='easytechpack_v2',MAX_IMG=400;
function getStore(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function setStore(d){try{localStorage.setItem(SK,JSON.stringify(d));showSave()}catch(e){if(e.name==='QuotaExceededError')alert('Storage full! Use smaller images.')}}

function showSave(){const e=document.getElementById('save-indicator');e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1500)}
let _st=null;function debouncedSave(){clearTimeout(_st);_st=setTimeout(saveAll,400)}
function getState(k){return getStore()[k]||[]}
function setState(k,d){const s=getStore();s[k]=d;setStore(s)}

function compressImage(dataUrl,cb){const img=new Image();img.onload=function(){const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>MAX_IMG||h>MAX_IMG){if(w>h){h=Math.round(h*MAX_IMG/w);w=MAX_IMG}else{w=Math.round(w*MAX_IMG/h);h=MAX_IMG}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',.7))};img.src=dataUrl}

function saveAll(){
const s=getStore();
['brand-name','style-name','pack-date','pack-version','designer-name','season','style-desc'].forEach(id=>{
const el=document.getElementById(id);if(el)s[id.replace(/-/g,'_')]=el.value});
s.logoDataUrl=getStore().logoDataUrl;
setStore(s);updateFileName();updateConfidential()
}
function loadAll(){
const s=getStore();
const m={'brand-name':'brand_name','style-name':'style_name','pack-date':'pack_date','pack-version':'pack_version','designer-name':'designer_name','season':'season','style-desc':'style_desc'};
Object.entries(m).forEach(([id,key])=>{if(s[key])document.getElementById(id).value=s[key]});
if(s.logoDataUrl)showLogo(s.logoDataUrl);
updateFileName();updateConfidential()
}
function updateFileName(){
const b=document.getElementById('brand-name').value||'BRAND';
const st=document.getElementById('style-name').value||'STYLE';
const d=document.getElementById('pack-date').value||new Date().toISOString().split('T')[0];
const fn=`${b.replace(/\s+/g,'-')}-${st.replace(/\s+/g,'-')}-${d}`;
const el=document.getElementById('file-name');if(el)el.textContent=fn
}
function updateConfidential(){
const b=document.getElementById('brand-name').value||'YOUR BRAND';
document.querySelectorAll('.conf-brand').forEach(el=>el.textContent=b.toUpperCase())
}

function handleLogo(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>compressImage(r.result,c=>{showLogo(c);const s=getStore();s.logoDataUrl=c;setStore(s)});r.readAsDataURL(f)}
function showLogo(src){document.getElementById('logo-preview').innerHTML='<img src="'+escapeHTML(src)+'" alt="Logo">'}
function newTechPack(){if(!confirm('Start a new tech pack? All data will be cleared.'))return;localStorage.removeItem(SK);location.reload()}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('show')}

// Navigation
document.querySelectorAll('.nav-item').forEach(item=>{
item.addEventListener('click',()=>{
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

item.classList.add('active');

})});

function updatePageNumbers(){
const totalPages=document.querySelectorAll('.page').length;
document.querySelectorAll('.page').forEach((p,i)=>{
const el=document.getElementById('page-num-'+p.id.replace('page-',''));

// Generic table renderer
function renderTable(bodyId,cols,rows){
const tbody=document.getElementById(bodyId);if(!tbody)return;tbody.innerHTML='';
rows.forEach((row,i)=>{
const tr=document.createElement('tr');
cols.forEach(c=>{
const td=document.createElement('td');
if(c.type==='select'){
const opts=(c.options||[]).map(o=>'<option'+(row[c.key]===o?' selected':'')+'>'+o+'</option>').join('');
td.innerHTML='<select onchange="'+c.fn+'('+i+',\''+c.key+'\',this.value)">'+opts+'</select>'
}else if(c.type==='color'){
td.innerHTML='<input type="color" value="'+escapeHTML(row[c.key]||'#000000')+'" style="width:40px;height:30px;border:none;padding:0;cursor:pointer" onchange="'+c.fn+'('+i+',\''+c.key+'\',this.value)">'
}else if(c.type==='textarea'){
td.innerHTML='<textarea oninput="'+c.fn+'('+i+',\''+c.key+'\',this.value)" placeholder="'+escapeHTML(c.ph||'')+'">'+escapeHTML(row[c.key]||'')+'</textarea>'
}else if(c.type==='img'){
td.innerHTML='<input type="file" accept="image/*" style="font-size:11px" onchange="uploadImg(\''+c.storeKey+'\','+i+',\''+c.key+'\',this)">'+(row[c.key]?'<br><img src="'+row[c.key]+'" style="max-width:60px;max-height:40px;margin-top:4px">':'')
}else{
td.innerHTML='<input type="text" value="'+escapeHTML(row[c.key]||'')+'" placeholder="'+escapeHTML(c.ph||'')+'" oninput="'+c.fn+'('+i+',\''+c.key+'\',this.value)">'
}
tr.appendChild(td)});
const td=document.createElement('td');td.innerHTML='<button class="del-btn" onclick="delRow(\''+cols[0].store+'\','+i+')">&times;</button>';tr.appendChild(td);
tbody.appendChild(tr)})}

function uploadImg(storeKey,i,key,input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>compressImage(r.result,c=>{const rows=getState(storeKey);rows[i][key]=c;setState(storeKey,rows);renderAll()});r.readAsDataURL(f)}

function delRow(type,i){const rows=getState(type);rows.splice(i,1);setState(type,rows);renderAll()}
function updateField(type,i,key,val){const rows=getState(type);rows[i][key]=val;setState(type,rows)}

// Sketch management
function addSketch(type){
const key=type==='sketches'?'sketches':'details';
const rows=getState(key);rows.push({image:'',label:'',notes:''});setState(key,rows);renderSketches(type)
}
function delSketch(type,i){
const key=type==='sketches'?'sketches':'details';
const rows=getState(key);rows.splice(i,1);setState(key,rows);renderSketches(type)
}
function renderSketches(type){
const key=type==='sketches'?'sketches':'details';
const gridId=type==='sketches'?'sketch-grid':'detail-grid';
const grid=document.getElementById(gridId);if(!grid)return;
const rows=getState(key);grid.innerHTML='';
if(!rows.length){grid.innerHTML='<div style="color:#888;font-size:13px;padding:20px">No sketches yet. Click "+ Add" to start.</div>';return}
rows.forEach((r,i)=>{
const card=document.createElement('div');card.className='sketch-card';
const imgDiv=document.createElement('div');imgDiv.className='sketch-card-img';
imgDiv.onclick=()=>document.getElementById('sf-'+type+'-'+i).click();
if(r.image){const img=document.createElement('img');img.src=r.image;imgDiv.appendChild(img)}
else{const sp=document.createElement('span');sp.textContent='Click to upload';imgDiv.appendChild(sp)}
card.appendChild(imgDiv);
const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.display='none';fi.id='sf-'+type+'-'+i;
fi.onchange=function(){const f=this.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>compressImage(rd.result,c=>{const rw=getState(key);rw[i].image=c;setState(key,rw);renderSketches(type)});rd.readAsDataURL(f)};
card.appendChild(fi);
const ld=document.createElement('div');ld.className='sketch-card-input';
const ll=document.createElement('label');ll.textContent='Label';ld.appendChild(ll);
const li=document.createElement('input');li.type='text';li.value=r.label||'';li.placeholder='e.g. Front View';
li.oninput=function(){const rw=getState(key);rw[i].label=this.value;setState(key,rw)};ld.appendChild(li);card.appendChild(ld);
const nd=document.createElement('div');nd.className='sketch-card-input';
const nl=document.createElement('label');nl.textContent='Notes';nd.appendChild(nl);
const ni=document.createElement('input');ni.type='text';ni.value=r.notes||'';ni.placeholder='Details...';
ni.oninput=function(){const rw=getState(key);rw[i].notes=this.value;setState(key,rw)};nd.appendChild(ni);card.appendChild(nd);
const dd=document.createElement('div');dd.style.padding='8px 12px';dd.style.textAlign='right';
const db=document.createElement('button');db.className='del-btn';db.innerHTML='&times;';db.onclick=()=>delSketch(type,i);dd.appendChild(db);card.appendChild(dd);
grid.appendChild(card)})}

// PDF Export
async function exportPDF(){
if(typeof html2canvas==='undefined'||typeof jspdf==='undefined'){alert('PDF libraries failed to load.');return}
const overlay=document.getElementById('export-overlay');const statusEl=document.getElementById('export-status');const btn=document.querySelector('.export-btn');
overlay.classList.add('show');btn.disabled=true;
try{
const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');const pw=210,ph=297,mg=15;
const pageIds=Array.from(document.querySelectorAll('.page')).map(p=>p.id.replace('page-',''));
for(let pi=0;pi<pageIds.length;pi++){
statusEl.textContent=`Rendering: ${pageIds[pi]} (${pi+1}/${pageIds.length})`;
const el=document.getElementById('page-'+pageIds[pi]);
const od=el.style.display,op=el.style.position,ol=el.style.left,ow=el.style.width;
el.style.display='block';el.style.position='absolute';el.style.left='-9999px';el.style.width='800px';el.style.background='#fff';el.style.padding='20px';
try{
const canvas=await html2canvas(el,{scale:1.5,useCORS:true,logging:false,backgroundColor:'#ffffff'});
const imgData=canvas.toDataURL('image/jpeg',.95);const iw=pw-mg*2;const ih=(canvas.height*iw)/canvas.width;
if(pi>0)pdf.addPage();pdf.setFontSize(8);pdf.setTextColor(150);
const b=document.getElementById('brand-name').value||'EasyTechPack';const st=document.getElementById('style-name').value||'';
pdf.text(`${b} - ${st} - Page ${pi+1}`,mg,10);
if(ih>ph-mg*2){
const sp=Math.ceil(ih/(ph-mg*2));
for(let s=0;s<sp;s++){
if(s>0){pdf.addPage();pdf.setFontSize(8);pdf.setTextColor(150);pdf.text(`${b} - ${st} - Page ${pi+1}.${s+1}`,mg,10)}
const sy=s*(ph-mg*2)*(canvas.width/iw);const sh=Math.min((ph-mg*2)*(canvas.width/iw),canvas.height-sy);
const tc=document.createElement('canvas');tc.width=canvas.width;tc.height=sh;tc.getContext('2d').drawImage(canvas,0,sy,canvas.width,sh,0,0,canvas.width,sh);
const ti=tc.toDataURL('image/jpeg',.95);const rh=(sh*iw)/canvas.width;
pdf.addImage(ti,'JPEG',mg,15,iw,Math.min(rh,ph-30))}}else{pdf.addImage(imgData,'JPEG',mg,15,iw,ih)}
}catch(e){console.error('PDF error:',pageIds[pi],e)}
el.style.display=od;el.style.position=op;el.style.left=ol;el.style.width=ow;el.style.background='';el.style.padding=''}
const bn=(document.getElementById('brand-name').value||'TechPack').replace(/\s+/g,'-');
const sn=(document.getElementById('style-name').value||'Style').replace(/\s+/g,'-');
pdf.save(`${bn}_${sn}.pdf`)}catch(e){alert('Export failed: '+e.message)}
overlay.classList.remove('show');btn.disabled=false}

// Init
function init(){
loadAll();renderAll();
if(!document.getElementById('pack-date').value){document.getElementById('pack-date').value=new Date().toISOString().split('T')[0];saveAll()}}
init();
</script>
</body>
</html>
